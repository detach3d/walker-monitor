<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Walker Monitor Logo</title>
  <desc id="desc">A modern shield mark with process graph and pulse line in blue and cyan tones.</desc>
  <defs>
    <linearGradient id="bg" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#0a1c33"/>
      <stop offset="55%" stop-color="#0f2743"/>
      <stop offset="100%" stop-color="#112f4e"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <path d="M64 10L107 27v31c0 29-19 50-43 60C40 108 21 87 21 58V27L64 10z" fill="url(#bg)"/>
  <path d="M64 14l39 15v29c0 27-17 46-39 56-22-10-39-29-39-56V29l39-15z" fill="none" stroke="url(#rim)" stroke-width="3.2"/>

  <circle cx="64" cy="53" r="27" fill="none" stroke="#1e3a5f" stroke-width="2"/>
  <circle cx="64" cy="53" r="19" fill="none" stroke="#245175" stroke-width="1.5"/>
  <circle cx="64" cy="53" r="4" fill="#7dd3fc"/>

  <g fill="none" stroke="url(#pulse)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <path d="M37 72h12l5-11 6 18 6-12h8l4-7h13"/>
  </g>

  <g fill="#bfe7ff" filter="url(#softGlow)">
    <circle cx="37" cy="72" r="2.4"/>
    <circle cx="54" cy="61" r="2.4"/>
    <circle cx="60" cy="79" r="2.4"/>
    <circle cx="66" cy="67" r="2.4"/>
    <circle cx="78" cy="60" r="2.4"/>
    <circle cx="91" cy="60" r="2.4"/>
  </g>

  <path d="M43 43l8 16 7-12 6 8 7-12 9 16" fill="none" stroke="#93c5fd" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
